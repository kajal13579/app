```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Donation App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #E24B4A;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

button {
  background: #E24B4A;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 5px;
  cursor: pointer;
}

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0 10px;
}

.hidden {
  display: none;
}
</style>

</head>
<body>

<header>
  <h2>🩸 Blood Donation App</h2>
</header>

<div class="container">

  <!-- Home -->
  <div id="home">
    <div class="card">
      <h3>Welcome</h3>
      <p>Donate blood and save lives ❤️</p>
      <button onclick="show('register')">Register Donor</button>
      <button onclick="show('request')">Request Blood</button>
      <button onclick="show('donors')">Find Donors</button>
    </div>
  </div>

  <!-- Register -->
  <div id="register" class="hidden">
    <div class="card">
      <h3>Register Donor</h3>
      <input id="name" placeholder="Name">
      <input id="phone" placeholder="Phone">
      <select id="blood">
        <option>O+</option><option>O-</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>AB+</option><option>AB-</option>
      </select>
      <button onclick="addDonor()">Submit</button>
      <button onclick="show('home')">Back</button>
    </div>
  </div>

  <!-- Request -->
  <div id="request" class="hidden">
    <div class="card">
      <h3>Request Blood</h3>
      <input id="patient" placeholder="Patient Name">
      <select id="reqBlood">
        <option>O+</option><option>O-</option>
        <option>A+</option><option>A-</option>
        <option>B+</option><option>B-</option>
        <option>AB+</option><option>AB-</option>
      </select>
      <button onclick="requestBlood()">Submit</button>
      <button onclick="show('home')">Back</button>
    </div>
  </div>

  <!-- Donors -->
  <div id="donors" class="hidden">
    <div class="card">
      <h3>Donor List</h3>
      <ul id="list"></ul>
      <button onclick="show('home')">Back</button>
    </div>
  </div>

</div>

<script>
let donors = [];

function show(section) {
  document.querySelectorAll('.container > div').forEach(div => div.classList.add('hidden'));
  document.getElementById(section).classList.remove('hidden');
}

function addDonor() {
  let name = document.getElementById('name').value;
  let phone = document.getElementById('phone').value;
  let blood = document.getElementById('blood').value;

  donors.push({name, phone, blood});
  alert("Donor Registered!");
  show('home');
}

function requestBlood() {
  let patient = document.getElementById('patient').value;
  let blood = document.getElementById('reqBlood').value;

  alert("Request submitted for " + patient + " (" + blood + ")");
  show('home');
}

function showDonors() {
  let list = document.getElementById('list');
  list.innerHTML = "";

  donors.forEach(d => {
    let li = document.createElement('li');
    li.innerText = d.name + " - " + d.blood + " - " + d.phone;
    list.appendChild(li);
  });
}

document.getElementById('donors').addEventListener('click', showDonors);
</script>

</body>
</html>
